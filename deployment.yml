trigger:
  branches:
    include:
      - main

variables:
  acrName: enterprisepocacr
  imageTag: $(Build.BuildId)

pool:
  vmImage: ubuntu-latest

stages:

# ==========================================
# BUILD STAGE
# ==========================================
- stage: Build
  jobs:

  # -----------------------------
  # User Auth Service
  # -----------------------------
  - job: Build_UserAuthService
    steps:

    - task: AzureCLI@2
      inputs:
        command: buildAndPush
        repository: user-auth-service
        dockerfile: userAuthService/Dockerfile
        containerRegistry: acr-service-connection
        tags: |
          $(imageTag)

  # -----------------------------
  # Insurance Service
  # -----------------------------
  - job: Build_InsuranceService
    steps:

    - task: AzureCLI@2
      inputs:
        command: buildAndPush
        repository: insurance-service
        dockerfile: insuranceService/Dockerfile
        containerRegistry: acr-service-connection
        tags: |
          $(imageTag)


# ==========================================
# DEPLOY STAGE
# ==========================================
- stage: Deploy
  dependsOn: Build

  jobs:

  # -----------------------------
  # Deploy User Auth Service
  # -----------------------------
  - deployment: Deploy_UserAuthService

    environment: production

    strategy:
      runOnce:
        deploy:
          steps:

          - task: KubernetesManifest@1
            inputs:
              action: deploy
              kubernetesServiceConnection: aks-service-connection
              namespace: production

              manifests: |
                k8s/userAuthService/deployment.yaml
                k8s/userAuthService/service.yaml
                k8s/userAuthService/hpa.yaml

              containers: |
                enterprisepocacr.azurecr.io/user-auth-service:$(imageTag)


  # -----------------------------
  # Deploy Insurance Service
  # -----------------------------
  - deployment: Deploy_InsuranceService

    environment: production

    strategy:
      runOnce:
        deploy:
          steps:

          - task: KubernetesManifest@1
            inputs:
              action: deploy
              kubernetesServiceConnection: aks-service-connection
              namespace: production

              manifests: |
                k8s/insuranceService/deployment.yaml
                k8s/insuranceService/service.yaml
                k8s/insuranceService/hpa.yaml

              containers: |
                enterprisepocacr.azurecr.io/insurance-service:$(imageTag)
                