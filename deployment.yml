trigger:
  branches:
    include:
      - main
      - feature/*
      - fix/*
      - release/*

pool:
  vmImage: ubuntu-latest

variables:
  - group: Migration-pipeline-varG

  - name: dockerRegistryServiceConnection
    value: acr-service-connection

  - name: sonarServiceConnection
    value: sonar-service-connection

  - name: imageRepositoryUserAuth
    value: user-auth-service

  - name: imageRepositoryInsurance
    value: insurance-service

stages:

# ======================================================
# VERSION CALCULATION
# ======================================================

- stage: CalculateVersion
  displayName: Calculate Semantic Versions

  jobs:
    - job: Versioning
      displayName: Calculate Auth and Insurance Versions

      steps:
        - checkout: self

        - script: |
            set -e

            git clone https://$(HELM_PAT)@dev.azure.com/yadavkartik0506/MS-migration/_git/Central-Helm

            cd Central-Helm

            BRANCH="$(Build.SourceBranch)"

            echo "Branch: $BRANCH"

            bump_version() {
              VERSION_FILE=$1

              VERSION=$(cat $VERSION_FILE)

              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

              if [[ "$BRANCH" == refs/heads/fix/* ]]; then
                PATCH=$((PATCH+1))

              elif [[ "$BRANCH" == refs/heads/feature/* ]]; then
                MINOR=$((MINOR+1))
                PATCH=0

              elif [[ "$BRANCH" == refs/heads/release/* ]]; then
                MAJOR=$((MAJOR+1))
                MINOR=0
                PATCH=0
              fi

              echo "$MAJOR.$MINOR.$PATCH"
            }

            AUTH_VERSION=$(bump_version versions/auth.version)

            INSURANCE_VERSION=$(bump_version versions/insurance.version)

            echo "Auth Version: $AUTH_VERSION"
            echo "Insurance Version: $INSURANCE_VERSION"

            echo "##vso[task.setvariable variable=authImageTag;isOutput=true]$AUTH_VERSION"
            echo "##vso[task.setvariable variable=insuranceImageTag;isOutput=true]$INSURANCE_VERSION"
          name: VersionStep

