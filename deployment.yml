trigger:
  branches:
    include:
      - main

variables:
  acrName: enterprisepocacr
  imageTag: $(Build.BuildId)
  imageRepositoryUserAuth: user-auth-service
  imageRepositoryInsurance: insurance-service
  dockerRegistryServiceConnection: acr-service-connection
  azureSubscriptionConnection: azure-devOps-pipeline
  aksResourceGroup: rg-enterprise-migration-poc
  aksClusterName: enterprise-aks
  namespace: prod

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: Build and Push
  jobs:
  - job: Build_UserAuthService
    displayName: Build User Auth Service
    steps:
    - task: Docker@2
      displayName: Build and push User Auth image
      inputs:
        command: buildAndPush
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageRepositoryUserAuth)
        dockerfile: userAuthService/Dockerfile
        tags: |
          $(imageTag)

  - job: Build_InsuranceService
    displayName: Build Insurance Service
    steps:
    - task: Docker@2
      displayName: Build and push Insurance image
      inputs:
        command: buildAndPush
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageRepositoryInsurance)
        dockerfile: insuranceService/Dockerfile
        tags: |
          $(imageTag)

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:

  - deployment: Deploy_UserAuthService
    displayName: Deploy User Auth Service
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          # Optional: quick debug
          - script: |
              ls -la
              ls -la k8s/
              ls -la k8s/userAuthService/
            displayName: Check manifest files

          # AKS auth + deploy via AzureCLI@2 inline script
          - task: AzureCLI@2
            displayName: 'AKS auth + Deploy User Auth'
            inputs:
              azureSubscription: $(azureSubscriptionConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                # Install kubectl (if not already present)
                az aks install-cli

                # Get AKS credentials
                az aks get-credentials \
                  --resource-group $(aksResourceGroup) \
                  --name $(aksClusterName) \
                  --overwrite-existing

                # If AKS uses AAD + RBAC, enable Azure CLI login
                kubelogin convert-kubeconfig -l azurecli

                # Optional: verify context
                kubectl config current-context

                # Deploy manifests
                kubectl apply -f k8s/userAuthService/

                # Optional: patch image (if you want to use the exact image tag)
                kubectl set image \
                  deployment/user-auth-deployment \
                  user-auth-container=$(acrName).azurecr.io/$(imageRepositoryUserAuth):$(imageTag) \
                  -n $(namespace) || true

          - script: |
              echo "✅ User AuthService deployed to namespace '$(namespace)'"
            displayName: Notify success


  - deployment: Deploy_InsuranceService
    displayName: Deploy Insurance Service
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'AKS auth + Deploy Insurance'
            inputs:
              azureSubscription: $(azureSubscriptionConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks install-cli
                az aks get-credentials \
                  --resource-group $(aksResourceGroup) \
                  --name $(aksClusterName) \
                  --overwrite-existing
                kubelogin convert-kubeconfig -l azurecli

                kubectl apply -f k8s/insuranceService/

                kubectl set image \
                  deployment/insurance-deployment \
                  insurance-container=$(acrName).azurecr.io/$(imageRepositoryInsurance):$(imageTag) \
                  -n $(namespace) || true

          - script: |
              echo "InsuranceService deployed to namespace '$(namespace)'"
            displayName: Notify success