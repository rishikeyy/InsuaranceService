# ======================================================
# BUILD AND PUSH
# ======================================================

- stage: Build
  dependsOn: CalculateVersion
  # condition: and(succeeded(), false)
  variables:
    authImageTag: $[ stageDependencies.CalculateVersion.Versioning.outputs['VersionStep.authImageTag'] ]
    insuranceImageTag: $[ stageDependencies.CalculateVersion.Versioning.outputs['VersionStep.insuranceImageTag'] ]

  jobs:
    - job: BuildUserAuth
      displayName: Build User Auth Service

      steps:

      - script: |
          echo "Auth Tag = $(authImageTag)"
          echo "Insurance Tag = $(insuranceImageTag)"
        displayName: Debug Tags

      - task: Docker@2
        inputs:
          command: buildAndPush
          containerRegistry: $(dockerRegistryServiceConnection)
          repository: $(imageRepositoryUserAuth)
          dockerfile: userAuthService/Dockerfile
          tags: |
            $(authImageTag)

    - job: BuildInsurance
      displayName: Build Insurance Service

      steps:
        - task: Docker@2
          inputs:
            command: buildAndPush
            containerRegistry: $(dockerRegistryServiceConnection)
            repository: $(imageRepositoryInsurance)
            dockerfile: insuranceService/Dockerfile
            tags: |
              $(insuranceImageTag)

# ======================================================
# UPDATE HELM REPO
# ======================================================

- stage: UpdateHelmRepo
  dependsOn: Build

  variables:
    authImageTag: $[ stageDependencies.CalculateVersion.Versioning.outputs['VersionStep.authImageTag'] ]
    insuranceImageTag: $[ stageDependencies.CalculateVersion.Versioning.outputs['VersionStep.insuranceImageTag'] ]

  jobs:
    - job: UpdateHelm
      displayName: Update Helm Repo

      steps:
        - checkout: none

        - script: |
            set -e

            git config --global user.email "yadavkartik0506@outlook.com"
            git config --global user.name "kartikey yadav"

            git clone https://$(HELM_PAT)@dev.azure.com/yadavkartik0506/MS-migration/_git/Central-Helm

            cd Central-Helm

            sed -i "s/tag:.*/tag: $(authImageTag)/" environments/dev/auth-image.yaml

            sed -i "s/tag:.*/tag: $(insuranceImageTag)/" environments/dev/insurance-image.yaml

            echo "$(authImageTag)" > versions/auth.version

            echo "$(insuranceImageTag)" > versions/insurance.version

            git add .

            git commit -m "Release Auth $(authImageTag) | Insurance $(insuranceImageTag)"

            git push origin main
          displayName: Commit Helm Changes
