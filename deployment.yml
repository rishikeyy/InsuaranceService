trigger:
  branches:
    include:
      - main
      - feature/*
      - fix/*

variables:

  acrName: enterprisepocacr

  dockerRegistryServiceConnection: acr-service-connection

  sonarServiceConnection: sonar-service-connection

  gitOpsRepo: CENTRAL-GITOPS

  gitOpsBranch: main

  imageRepositoryUserAuth: user-auth-service
  imageRepositoryInsurance: insurance-service

  authImageTag: $(Build.BuildId)-auth
  insuranceImageTag: $(Build.BuildId)-insurance





  - stage: CodeQuality

  displayName: SonarQube Analysis

  jobs:

  - job: Sonar

    pool:
      vmImage: ubuntu-latest

    steps:

    - checkout: self

    - task: SonarQubePrepare@5

      inputs:
        SonarQube: $(sonarServiceConnection)

        scannerMode: CLI

        configMode: manual

        cliProjectKey: InsuranceService

        cliProjectName: InsuranceService

    - script: |
        dotnet build

      displayName: Build Solution

    - task: SonarQubeAnalyze@5

    - task: SonarQubePublish@5

      inputs:
        pollingTimeoutSec: 300






  - stage: Build

  dependsOn: CodeQuality

  jobs:

  - job: BuildUserAuth

    steps:

    - task: Docker@2

      inputs:
        command: buildAndPush

        containerRegistry: $(dockerRegistryServiceConnection)

        repository: $(imageRepositoryUserAuth)

        dockerfile: userAuthService/Dockerfile

        tags: |
          $(authImageTag)

  - job: BuildInsurance

    steps:

    - task: Docker@2

      inputs:
        command: buildAndPush

        containerRegistry: $(dockerRegistryServiceConnection)

        repository: $(imageRepositoryInsurance)

        dockerfile: insuranceService/Dockerfile

        tags: |
          $(insuranceImageTag)


- stage: UpdateGitOps

  dependsOn: Build

  jobs:

  - job: UpdateGitOpsRepo

    pool:
      vmImage: ubuntu-latest

    steps:

    - checkout: none

    - script: |

        git config --global user.email "azuredevops@company.com"
        git config --global user.name "Azure DevOps"

        git clone https://$(GITOPS_PAT)@dev.azure.com/<ORG>/<PROJECT>/_git/CENTRAL-GITOPS

        cd CENTRAL-GITOPS

        sed -i "s/tag:.*/tag: $(authImageTag)/" \
        environments/dev/auth-image.yaml

        sed -i "s/tag:.*/tag: $(insuranceImageTag)/" \
        environments/dev/insurance-image.yaml

        git add .

        git commit -m "Deploy build $(authImageTag) and $(insuranceImageTag)"

        git push origin main

      displayName: Update GitOps Repo