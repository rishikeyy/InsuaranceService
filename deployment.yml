trigger:
  branches:
    include:
      - main

variables:
  acrName: enterprisepocacr
  imageTag: $(Build.BuildId)
  imageRepositoryUserAuth: user-auth-service
  imageRepositoryInsurance: insurance-service
  dockerRegistryServiceConnection: acr-service-connection
  azureSubscriptionConnection: azure-devOps-pipeline
  aksResourceGroup: rg-enterprise-migration-poc
  aksClusterName: enterprise-aks
  namespace: production

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  displayName: Build and Push
  jobs:
  - job: Build_UserAuthService
    displayName: Build User Auth Service
    steps:
    - task: Docker@2
      displayName: Build and push User Auth image
      inputs:
        command: buildAndPush
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageRepositoryUserAuth)
        dockerfile: userAuthService/Dockerfile
        tags: |
          $(imageTag)

  - job: Build_InsuranceService
    displayName: Build Insurance Service
    steps:
    - task: Docker@2
      displayName: Build and push Insurance image
      inputs:
        command: buildAndPush
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageRepositoryInsurance)
        dockerfile: insuranceService/Dockerfile
        tags: |
          $(imageTag)

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - deployment: Deploy_UserAuthService
    displayName: Deploy User Auth Service
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - script: |
              ls -la
              ls -la k8s/
              ls -la k8s/userAuthService/
            displayName: Check manifest files
          - task: KubernetesManifest@1
            displayName: Deploy User Auth manifests
            inputs:
              action: deploy
              connectionType: azureResourceManager
              azureSubscriptionConnection: $(azureSubscriptionConnection)
              azureResourceGroup: $(aksResourceGroup)
              kubernetesCluster: $(aksClusterName)
              namespace: $(namespace)
              manifests: |
                k8s/userAuthService/deployment.yml
                k8s/userAuthService/service.yml
                k8s/userAuthService/hpa.yml
              containers: |
                $(acrName).azurecr.io/$(imageRepositoryUserAuth):$(imageTag)

  - deployment: Deploy_InsuranceService
    displayName: Deploy Insurance Service
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - task: KubernetesManifest@1
            displayName: Deploy Insurance manifests
            inputs:
              action: deploy
              connectionType: azureResourceManager
              azureSubscriptionConnection: $(azureSubscriptionConnection)
              azureResourceGroup: $(aksResourceGroup)
              kubernetesCluster: $(aksClusterName)
              namespace: $(namespace)
              manifests: |
                k8s/insuranceService/deployment.yml
                k8s/insuranceService/service.yml
                k8s/insuranceService/hpa.yml
              containers: |
                $(acrName).azurecr.io/$(imageRepositoryInsurance):$(imageTag)