apiVersion: apps/v1
kind: Deployment
metadata:
  name: insurance-service-deployment
  namespace: production
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: insuranceService

  template:
    metadata:
      labels:
        app: insuranceService

    spec:
      nodeSelector:
        agentpool: backendpool

      containers:
      - name: insuranceService
        image: enterprisepocacr.azurecr.io/insurance-service:latest

        ports:
        - containerPort: 3000

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        envFrom:
        - configMapRef:
            name: insurance-service-config

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10