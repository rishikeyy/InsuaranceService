name: Insurance-CI Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop

  pull_request:
    branches:
      - main
      - master
      - develop

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Give execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Build Project
        run: ./mvnw clean install

      - name: Run Tests
        run: ./mvnw test